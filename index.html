<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Terminal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' fill='%2300ff99' text-anchor='middle' font-family='monospace'>&gt;_</text></svg>">
</head>
<body>
<canvas id="canvas"></canvas>
<textarea id="codeEditor" class="editor" spellcheck="false" autocorrect="off" autocapitalize="off" translate="no" oninput="render()" style="display:none;"></textarea>
<pre id="error" style="display:none;"></pre>
<div id="indicator" style="display:none;"></div>

<!-- Developer Console Panel -->
<div id="devConsole" class="dev-console">
  <div class="dev-header">
    <span class="dev-title">Developer Console</span>
    <button class="dev-btn" onclick="toggleDevTools()">−</button>
  </div>
  <div class="dev-body">
    <div id="devOutput" class="dev-output"></div>
    <div class="dev-input-wrapper">
      <span class="dev-prompt">&gt;</span>
      <input type="text" id="devInput" class="dev-input" placeholder="Enter command..." onkeypress="handleDevCommand(event)">
    </div>
  </div>
</div>

<div id="controls">
  <div class="controls">
    <input id="btnToggleView" class="icon" type="checkbox" name="toggleView" onclick="toggleView()" style="display:none;">
    <input id="btnToggleResolution" class="icon" type="checkbox" name="toggleResolution" onchange="toggleResolution()" style="display:none;">
    <input id="btnReset" class="icon" type="checkbox" name="reset" onclick="reset()" style="display:none;">
    <input id="btnPlayStop" class="icon" type="checkbox" name="playStop" onclick="togglePlayStop()" style="display:none;">
  </div>
</div>
<script type="x-shader/x-fragment">#version 300 es
precision highp float;
out vec4 O;
uniform float time;
uniform vec2 resolution;
uniform vec2 wheel;

#define FC gl_FragCoord.xy
#define R resolution
#define T time

float hash(float n) {
  return fract(sin(n) * 43758.5453);
}

float noise(float x) {
  float i = floor(x);
  float f = fract(x);
  f = f * f * (3.0 - 2.0 * f);
  return mix(hash(i), hash(i + 1.0), f);
}

void main() {
  vec2 uv = FC / R;

  // Grid ve scanlines
  vec2 grid = fract(uv * 20.0);
  float gridLine = step(0.98, grid.x) + step(0.98, grid.y);

  // Vertical scanlines
  float scanline = sin(uv.y * R.y * 0.5 + T * 2.0) * 0.5 + 0.5;
  scanline = mix(scanline, 1.0, 0.7);

  // Düşen karakterler (Matrix tarzı)
  float chars = 0.0;
  for(int i = 0; i < 5; i++) {
    float x = uv.x + float(i) * 0.2;
    float y = mod(uv.y - T * 0.3 + float(i) * 0.4, 1.0);
    float dist = distance(vec2(x, y), uv);
    if(dist < 0.05) {
      chars += (1.0 - dist / 0.05) * 0.3;
    }
  }

  // Neon yeşil renk (tema uyumlu)
  vec3 neonGreen = vec3(0.0, 1.0, 0.6) * 0.5;
  vec3 darkBg = vec3(0.02, 0.02, 0.02);

  // Gözlükler effekti (brightness pulse)
  float pulse = sin(T * 2.0) * 0.5 + 0.5;

  // Kombinasyon
  float intensity = (gridLine * 0.3 + chars + pulse * 0.1) * scanline;
  vec3 col = mix(darkBg, neonGreen, intensity * 0.6);

  // Vignette
  vec2 vigCoord = uv * (1.0 - uv);
  float vig = pow(vigCoord.x * vigCoord.y * 15.0, 0.25);
  col *= vig;

  O = vec4(col, 1.0);
}</script>
<script src="index.js"></script>
</body>
</html>
